<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연세대학교 임상병리학 통합 평가 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* [기존 연세대 테마 스타일 유지] */
        body { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; color: #1e293b; padding: 20px; background-image: url('./images/yonsei_bg.png'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #00205B; transition: all 0.5s ease; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); padding: 35px; border-radius: 8px; box-shadow: 0 8px 30px rgba(0, 56, 118, 0.2); border: 2px solid #003876; }
        h1, h2 { text-align: center; color: #003876; font-weight: 800; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; color: #fff; transition: 0.2s; }
        .btn-primary { background: #003876; }
        .btn-primary:hover { background: #0050a0; }
        .btn-secondary { background: #64748b; }
        .btn-danger { background: #8B0000; }
        .btn-success { background: #1e7e34; }
        
        /* 카테고리/과목 선택 영역 */
        .selector-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .selector-box { flex: 1; }
        .selector-box label { font-weight: bold; display: block; margin-bottom: 5px; color: #003876; font-size: 0.9em; }
        select { width: 100%; padding: 12px; font-size: 1em; border-radius: 4px; border: 1px solid #cbd5e1; background: white; color: #334155; }
        select:focus { border-color: #003876; outline: none; }
        
        .settings-box { background: #f8fafc; padding: 20px; border-radius: 6px; margin-bottom: 20px; text-align: center; border: 1px solid #cbd5e1; }
        .progress { text-align: right; color: #64748b; font-size: 0.95em; margin-bottom: 20px; font-weight: bold; }
        .question-text { font-size: 1.25em; font-weight: bold; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 14px 18px; border: 2px solid #cbd5e1; border-radius: 6px; background: white; cursor: pointer; text-align: left; transition: 0.2s; }
        .option-btn.selected { background: #003876; color: white; border-color: #003876; }
        .option-btn.correct { background: #1e7e34; color: white; }
        .option-btn.wrong { background: #b91c1c; color: white; }
        .feedback { margin-top: 25px; padding: 18px; border-radius: 6px; display: none; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.wrong { background: #f8d7da; color: #721c24; }
        #secret-btn { position: fixed; bottom: 15px; right: 15px; width: 30px; height: 30px; background: transparent; border: none; cursor: pointer; opacity: 0.05; z-index: 9999; }
        
        /* 고대 테마 이스터에그 */
        body.korea-theme { background-image: url('./images/korea_bg.png'); background-color: #820024; }
        body.korea-theme .container { border-color: #820024; }
        body.korea-theme h1, body.korea-theme h2, body.korea-theme .selector-box label { color: #820024; }
        body.korea-theme .btn-primary { background: #820024; }
    </style>
</head>
<body>

<button id="secret-btn" onclick="app.toggleTheme()"></button>

<div class="container">
    <div id="start-screen">
        <h1 id="main-title">Yonsei Clinical Science Portal</h1>
        
        <div class="selector-group">
            <div class="selector-box">
                <label>분류</label>
                <select id="category-select" onchange="app.onCategoryChange()">
                    <option value="내신">내신 (GPA)</option>
                    <option value="ASCPi">ASCPi</option>
                </select>
            </div>
            <div class="selector-box">
                <label>과목</label>
                <select id="subject-select" onchange="app.onSubjectChange()">
                    </select>
            </div>
        </div>

        <div id="status-box" class="settings-box">
            <p><strong id="display-subject-name">과목</strong> 데이터: <strong id="total-db-count">0</strong>문항</p>
            <p>내 오답 노트: <strong id="wrong-db-count">0</strong>문항</p>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #cbd5e1;">
            <label for="question-count">응시 문항 수: </label>
            <input type="number" id="question-count" value="10" min="1" style="width: 60px; padding: 5px; text-align: center;">
        </div>

        <div id="action-buttons">
            <button class="btn btn-primary" onclick="app.startQuiz('random')">실전 모의고사 응시</button>
            <button class="btn btn-secondary" onclick="app.startQuiz('all')">전체 문항 순차 학습</button>
            <button id="home-retry-wrong-btn" class="btn btn-danger" style="display:none;" onclick="app.startWrongQuiz()">오답 노트 응시</button>
        </div>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress">진행률: <span id="current-num">1</span> / <span id="total-num">10</span></div>
        <div class="question-box">
            <div id="question-text" class="question-text"></div>
            <div id="image-container"></div>
        </div>
        <div id="options-container" class="options"></div>
        <button id="submit-btn" class="btn btn-primary" onclick="app.checkAnswer()">답안 제출</button>
        <div id="feedback-box" class="feedback">
            <div id="feedback-text" style="font-weight: bold;"></div>
            <div id="explanation-text" style="margin-top: 10px;"></div>
        </div>
        <button id="next-btn" class="btn btn-success" style="display:none;" onclick="app.nextQuestion()">다음 문항</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>평가 결과</h2>
        <div class="result-stats" style="text-align: center; padding: 20px; background: #f8fafc; border-radius: 8px; margin: 20px 0;">
            성적: <strong id="correct-count" style="font-size: 1.5em; color: #1e7e34;">0</strong> / <span id="result-total-count">0</span>
            <div id="score-message" style="margin-top: 10px; font-weight: bold; color: #003876;"></div>
        </div>
        <button class="btn btn-primary" onclick="app.goHome()">다른 과목 선택</button>
    </div>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    const app = {
        // [데이터 관리] 카테고리별로 과목과 URL을 정리합니다.
        SHEET_DATA: {
            "내신": {
                "임상화학": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9G8mJqpsn9xWmhg_2LCAWbfi2vsZTxRdq77NStrnzYHG3HCfgpatnlFh1Y6gP0IblU3EVJMPYr6_0/pub?output=csv",
            },
            "ASCPi": {
                "Hematology": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQuHj_HvmwKjNLQFgJVo2AauHR5bqoBppnhijqepJ3Q4hnjPVHt3R2TDXzUGRyG8k8igkEAr8UwVMFI/pub?output=csv"
            }
        },

        currentCategory: "내신",
        currentSubject: "",
        allQuizData: [],
        currentQuizPool: [],
        wrongQuestions: [],
        currentIndex: 0,
        correctAnswers: 0,
        selectedOption: null,

        init() {
            this.loadTheme();
            this.onCategoryChange(); // 초기 카테고리에 따른 과목 세팅
        },

        // 카테고리 변경 시 과목 드롭다운 업데이트
        onCategoryChange() {
            this.currentCategory = $("category-select").value;
            const subjects = Object.keys(this.SHEET_DATA[this.currentCategory]);
            
            const subjectSelect = $("subject-select");
            subjectSelect.innerHTML = "";
            subjects.forEach(sub => {
                const opt = document.createElement("option");
                opt.value = sub;
                opt.innerText = sub;
                subjectSelect.appendChild(opt);
            });
            
            this.onSubjectChange();
        },

        // 과목 변경 시 데이터 로드
        onSubjectChange() {
            this.currentSubject = $("subject-select").value;
            $("display-subject-name").innerText = this.currentSubject;
            
            const url = this.SHEET_DATA[this.currentCategory][this.currentSubject];
            if (url && url.startsWith("http")) {
                this.loadWrongQuestions();
                this.fetchData(url);
            } else {
                this.allQuizData = [];
                this.updateHomeUI();
            }
        },

        fetchData(url) {
            Papa.parse(url, {
                download: true,
                header: true,
                complete: (results) => {
                    this.allQuizData = results.data.filter(row => row['문제'] && row['문제'].trim());
                    this.updateHomeUI();
                }
            });
        },

        updateHomeUI() {
            $("total-db-count").innerText = this.allQuizData.length;
            $("wrong-db-count").innerText = this.wrongQuestions.length;
            $("home-retry-wrong-btn").style.display = this.wrongQuestions.length > 0 ? "block" : "none";
        },

        // 과목별 고유 키 (카테고리 포함)로 오답 저장
        getStoreKey() { return `wrong_${this.currentCategory}_${this.currentSubject}`; },
        
        saveWrongQuestions() { localStorage.setItem(this.getStoreKey(), JSON.stringify(this.wrongQuestions)); },
        
        loadWrongQuestions() {
            const data = localStorage.getItem(this.getStoreKey());
            this.wrongQuestions = data ? JSON.parse(data) : [];
        },

        // [이하 퀴즈 핵심 로직은 이전과 동일한 app 구조 유지]
        showScreen(id) { ["start-screen", "quiz-area", "result-screen"].forEach(s => $(s).style.display = (s===id?'block':'none')); },
        
        startQuiz(mode) {
            if (this.allQuizData.length === 0) return alert("데이터가 없습니다.");
            this.currentQuizPool = (mode === 'random') 
                ? this.allQuizData.sort(()=>Math.random()-0.5).slice(0, Math.min(parseInt($("question-count").value), this.allQuizData.length))
                : this.allQuizData.slice();
            this.launch();
        },

        startWrongQuiz() { this.currentQuizPool = this.wrongQuestions.sort(()=>Math.random()-0.5); this.launch(); },

        launch() {
            this.currentIndex = 0; this.correctAnswers = 0;
            $("total-num").innerText = this.currentQuizPool.length;
            this.showScreen("quiz-area");
            this.loadQuestion();
        },

        loadQuestion() {
            const q = this.currentQuizPool[this.currentIndex];
            this.selectedOption = null;
            $("current-num").innerText = this.currentIndex + 1;
            $("question-text").innerText = q['문제'];
            $("image-container").innerHTML = (q['이미지'] && q['이미지'].trim()) ? `<img src="./images/${q['이미지'].trim()}" style="max-width:100%; border:1px solid #cbd5e1; margin-bottom:15px;" onerror="this.style.display='none'">` : '';
            
            const optsCont = $("options-container");
            optsCont.innerHTML = "";
            ['A','B','C','D','E'].forEach(opt => {
                const val = q[`보기${opt}`];
                if (val && val.trim()) {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = `${opt}) ${val}`;
                    btn.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        this.selectedOption = opt;
                    };
                    optsCont.appendChild(btn);
                }
            });
            
            $("feedback-box").style.display = 'none';
            $("next-btn").style.display = 'none';
            $("submit-btn").style.display = 'block';
        },

        checkAnswer() {
            if (!this.selectedOption) return alert("답안을 선택하세요.");
            const q = this.currentQuizPool[this.currentIndex];
            const isCorrect = this.selectedOption === q['정답'].trim().toUpperCase();

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.innerText.startsWith(q['정답'])) btn.classList.add('correct');
                else if (btn.classList.contains('selected') && !isCorrect) btn.classList.add('wrong');
            });

            if (isCorrect) {
                this.correctAnswers++;
                this.wrongQuestions = this.wrongQuestions.filter(wq => wq['문제'] !== q['문제']);
            } else {
                if (!this.wrongQuestions.some(wq => wq['문제'] === q['문제'])) this.wrongQuestions.push(q);
            }

            this.saveWrongQuestions();
            $("feedback-text").innerText = isCorrect ? "⭕ 정답입니다." : `❌ 오답입니다. (정답: ${q['정답']})`;
            $("feedback-box").className = `feedback ${isCorrect?'correct':'wrong'}`;
            $("explanation-text").innerText = q['해설'] || "";
            $("feedback-box").style.display = 'block';
            $("submit-btn").style.display = 'none';
            $("next-btn").style.display = 'block';
            $("next-btn").innerText = (this.currentIndex === this.currentQuizPool.length - 1) ? "결과 보기" : "다음 문항";
        },

        nextQuestion() {
            this.currentIndex++;
            if (this.currentIndex < this.currentQuizPool.length) this.loadQuestion();
            else this.finish();
        },

        finish() {
            this.showScreen("result-screen");
            $("correct-count").innerText = this.correctAnswers;
            $("result-total-count").innerText = this.currentQuizPool.length;
            const ratio = this.correctAnswers / this.currentQuizPool.length;
            $("score-message").innerText = ratio === 1 ? "Perfect! 연세의 자랑입니다." : ratio >= 0.7 ? "Excellent! 합격권입니다." : "학습이 더 필요합니다.";
        },

        goHome() { this.updateHomeUI(); this.showScreen("start-screen"); },

        toggleTheme() {
            document.body.classList.toggle("korea-theme");
            const isK = document.body.classList.contains("korea-theme");
            $("main-title").innerText = isK ? "Korea Univ. Med-Lab Portal" : "Yonsei Clinical Science Portal";
            localStorage.setItem("theme", isK ? "korea" : "yonsei");
        },

        loadTheme() { if (localStorage.getItem("theme") === "korea") this.toggleTheme(); }
    };

    document.addEventListener("DOMContentLoaded", () => app.init());
</script>
</body>
</html>
