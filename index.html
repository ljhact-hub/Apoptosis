<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연세대학교 임상병리학 통합 평가 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* 기본 테마 및 레이아웃 */
        body { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; color: #1e293b; padding: 20px; background-image: url('./images/yonsei_bg.png'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #00205B; transition: all 0.5s ease; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); padding: 35px; border-radius: 8px; box-shadow: 0 8px 30px rgba(0, 56, 118, 0.2); border: 2px solid #003876; }
        h1, h2, h3 { text-align: center; color: #003876; font-weight: 800; margin-bottom: 25px; }
        
        /* 버튼 스타일 */
        .btn { display: inline-block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; color: #fff; transition: 0.2s; text-align: center; box-sizing: border-box; }
        .btn-primary { background: #003876; }
        .btn-primary:hover { background: #0050a0; }
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #8B0000; }
        .btn-success { background: #1e7e34; }
        .btn-outline { background: transparent; border: 2px solid #003876; color: #003876; }
        .btn-outline:hover { background: #003876; color: #fff; }
        .btn-small { padding: 10px; font-size: 1em; width: auto; }
        
        /* 카테고리/입력 폼 */
        .selector-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .selector-box { flex: 1; }
        .selector-box label { font-weight: bold; display: block; margin-bottom: 5px; color: #003876; font-size: 0.9em; }
        select, input[type="text"], input[type="number"] { width: 100%; padding: 12px; font-size: 1em; border-radius: 4px; border: 1px solid #cbd5e1; background: white; color: #334155; box-sizing: border-box; }
        select:focus, input:focus { border-color: #003876; outline: none; }
        
        /* 대시보드 상태 박스 */
        .settings-box { background: #f8fafc; padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #cbd5e1; }
        .lr-bar-container { background: #e2e8f0; border-radius: 10px; height: 20px; overflow: hidden; margin-top: 10px; }
        .lr-bar { background: #1e7e34; height: 100%; width: 0%; transition: width 0.5s ease; }
        
        /* 북마크 영역 */
        .folder-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .folder-tag { background: #e0e7ff; color: #3730a3; padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 1px solid #c7d2fe; font-size: 0.9em; }
        .folder-tag:hover { background: #c7d2fe; }

        /* 퀴즈 공통 UI (그리드 레이아웃) */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .progress { color: #64748b; font-weight: bold; }
        
        /* 2단 분할 그리드 시스템 (반응형) */
        .quiz-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) {
            .quiz-grid { grid-template-columns: 1fr 1fr; }
        }

        /* 카드 UI */
        .review-card { position: relative; background: #f8fafc; border: 1px solid #cbd5e1; padding: 20px; border-radius: 6px; display: flex; flex-direction: column; }
        .review-card .q-title { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #003876; line-height: 1.4; padding-right: 35px; }
        .review-card .ans-comparison { margin: 10px 0; padding: 10px; background: white; border-radius: 4px; border-left: 4px solid #b91c1c; }
        
        .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: auto; }
        .option-btn { padding: 12px 14px; border: 2px solid #cbd5e1; border-radius: 6px; background: white; cursor: pointer; text-align: left; transition: 0.2s; font-size: 0.95em; }
        .option-btn:hover:not(:disabled) { border-color: #003876; background: #f1f5f9; }
        .option-btn.selected { background: #003876; color: white; border-color: #003876; }
        .option-btn.correct { background: #1e7e34; color: white; border-color: #1e7e34; }
        .option-btn.wrong { background: #b91c1c; color: white; border-color: #b91c1c; }
        
        /* 피드백 & 해설 */
        .feedback { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; }
        .feedback.correct { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .feedback.wrong { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .feedback.info { background: #e2e8f0; border: 1px solid #cbd5e1; color: #334155; display: block; }
        .explanation-text { margin-top: 8px; line-height: 1.5; font-size: 0.9em; white-space: pre-wrap; }

        /* 페이지네이션 (하단 이동 바) */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 30px; flex-wrap: wrap; }
        .page-btn { padding: 8px 12px; border: 1px solid #cbd5e1; background: white; cursor: pointer; border-radius: 4px; font-weight: bold; color: #334155; }
        .page-btn:hover:not(:disabled) { background: #e2e8f0; }
        .page-btn.active { background: #003876; color: white; border-color: #003876; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #secret-btn { position: fixed; bottom: 15px; right: 15px; width: 30px; height: 30px; background: transparent; border: none; cursor: pointer; opacity: 0.05; z-index: 9999; }
        
        /* 이스터에그: 고려대 테마 */
        body.korea-theme { background-image: url('./images/korea_bg.png'); background-color: #820024; }
        body.korea-theme .container { border-color: #820024; }
        body.korea-theme h1, body.korea-theme h2, body.korea-theme h3, body.korea-theme .selector-box label { color: #820024; }
        body.korea-theme .btn-primary { background: #820024; }
        body.korea-theme .btn-primary:hover { background: #5a0018; }
        body.korea-theme .btn-outline { border-color: #820024; color: #820024; }
        body.korea-theme .btn-outline:hover { background: #820024; color: #fff; }
        body.korea-theme .page-btn.active { background: #820024; border-color: #820024; }
        body.korea-theme .option-btn.selected { background: #820024; border-color: #820024; }
    </style>
</head>
<body>

<button id="secret-btn" onclick="app.toggleTheme()"></button>

<div class="container">
    <div id="start-screen">
        <h1 id="main-title">Yonsei Clinical Science Portal</h1>
        
        <div class="selector-group">
            <div class="selector-box">
                <label>분류</label>
                <select id="category-select" onchange="app.onCategoryChange()">
                    <option value="내신">내신 (GPA)</option>
                    <option value="ASCPi">ASCPi</option>
                </select>
            </div>
            <div class="selector-box">
                <label>과목</label>
                <select id="subject-select" onchange="app.onSubjectChange()">
                </select>
            </div>
        </div>

        <div class="settings-box">
            <h3>대시보드</h3>
            <p style="margin-bottom: 10px;"><strong id="display-subject-name">과목</strong> 보유 문항: <strong id="total-db-count">0</strong>개</p>
            
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; font-size: 0.9em;">동적 학습률 (완벽 숙지율)</label>
                <div class="lr-bar-container">
                    <div id="learning-rate-bar" class="lr-bar"></div>
                </div>
                <div style="text-align: right; font-size: 0.85em; margin-top: 5px; color: #64748b;"><span id="learning-rate-text">0</span>% (<span id="check-count">0</span> / <span id="total-db-count-lr">0</span>)</div>
            </div>

            <div style="text-align: left;">
                <label style="font-weight: bold; font-size: 0.9em; display: block;">내 북마크 폴더</label>
                <div id="bookmark-folders" class="folder-list">
                    <span style="font-size: 0.9em; color: #94a3b8;">저장된 폴더가 없습니다.</span>
                </div>
            </div>
        </div>

        <div>
            <button class="btn btn-secondary" style="margin-bottom: 15px;" onclick="app.showSearchScreen()">🔍 문제 검색 열기</button>
            <hr style="border:0; border-top: 1px solid #cbd5e1; margin-bottom: 15px;">
            
            <label style="font-weight: bold; font-size: 0.9em;">응시 문항 수:</label>
            <input type="number" id="question-count" value="10" min="1" style="width: 80px; padding: 8px; margin-bottom: 15px; display: inline-block;">
            
            <button class="btn btn-primary" onclick="app.startQuiz('practice')">✏️ 연습 모드 (자유 선택/개별 채점)</button>
            <button class="btn btn-danger" onclick="app.startQuiz('exam')">📝 시험 모드 (실전 평가/일괄 채점)</button>
            <button class="btn btn-outline" onclick="app.startReviewMode()">📖 해설 모드 (전체 훑어보기)</button>
        </div>
    </div>

    <div id="search-screen" style="display: none;">
        <div class="quiz-header">
            <div class="progress">🔍 문항 검색 (현재 과목 전체)</div>
            <button class="btn btn-secondary btn-small" onclick="app.goHome()">돌아가기</button>
        </div>
        <input type="text" id="full-search-input" placeholder="키워드를 입력하세요... (2글자 이상)" onkeyup="app.executeSearch()" style="margin-bottom: 20px;">
        <div id="full-search-results" class="quiz-grid">
            <div style="color:#64748b; text-align:center; padding:30px; grid-column: 1 / -1;">검색어를 입력하면 전체 문제 정보가 나타납니다.</div>
        </div>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="quiz-header">
            <div class="progress"><span id="mode-badge" style="background:#e2e8f0; padding:4px 8px; border-radius:4px; margin-right:10px; font-size:0.8em;">모드</span> 전체 <span id="total-quiz-num">0</span>문항 중 <span id="current-page-text">1</span>페이지</div>
            <button class="btn btn-secondary btn-small" onclick="app.goHome()">중단하기</button>
        </div>
        
        <div id="quiz-grid" class="quiz-grid"></div>
        
        <div id="quiz-footer" style="margin-top: 20px; border-top: 1px solid #cbd5e1; padding-top: 20px; text-align: center;">
            <div id="pagination-controls" class="pagination"></div>
            <button id="finish-exam-btn" class="btn btn-danger" style="display: none; width: 50%; margin: 20px auto 0;" onclick="app.finishExam()">시험 종료 및 최종 채점</button>
        </div>
    </div>

    <div id="study-area" style="display: none;">
        <div class="quiz-header">
            <div class="progress">📖 전체 해설 모드 (<span id="study-total-num">0</span>문항)</div>
            <button class="btn btn-secondary btn-small" onclick="app.goHome()">돌아가기</button>
        </div>
        <div id="study-list" class="quiz-grid"></div>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>시험 결과</h2>
        <div style="text-align: center; padding: 20px; background: #f8fafc; border-radius: 8px; margin-bottom: 20px; border: 1px solid #cbd5e1;">
            점수: <strong id="correct-count" style="font-size: 2.5em; color: #003876;">0</strong> <span style="font-size: 1.2em; color: #64748b;">/ <span id="result-total-count">0</span></span>
            <div id="score-message" style="margin-top: 10px; font-weight: bold; color: #1e7e34;"></div>
        </div>
        
        <h3 style="text-align: left; font-size: 1.2em; margin-bottom: 15px; color: #b91c1c;">📝 오답 노트 리뷰</h3>
        <div id="wrong-review-list" class="quiz-grid"></div>
        
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="app.goHome()">대시보드로 돌아가기</button>
    </div>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    const app = {
        SHEET_DATA: {
            "내신": {
                "임상화학": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9G8mJqpsn9xWmhg_2LCAWbfi2vsZTxRdq77NStrnzYHG3HCfgpatnlFh1Y6gP0IblU3EVJMPYr6_0/pub?output=csv",
            },
            "ASCPi": {
                "Hematology": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQuHj_HvmwKjNLQFgJVo2AauHR5bqoBppnhijqepJ3Q4hnjPVHt3R2TDXzUGRyG8k8igkEAr8UwVMFI/pub?output=csv"
            }
        },

        currentCategory: "내신",
        currentSubject: "",
        allQuizData: [],       
        currentQuizPool: [],   
        
        learningProgress: {},  
        bookmarks: {},         
        
        // --- 퀴즈 진행 상태 ---
        currentMode: "",       
        itemsPerPage: 2,       
        currentPage: 0,
        userAnswers: {},       
        practiceSubmitted: {}, 

        init() {
            this.loadTheme();
            this.loadStorageData();
            this.onCategoryChange();
        },

        loadStorageData() {
            const lp = localStorage.getItem("clinical_learning_progress");
            this.learningProgress = lp ? JSON.parse(lp) : {};
            const bm = localStorage.getItem("clinical_bookmarks");
            this.bookmarks = bm ? JSON.parse(bm) : {};
        },

        saveProgress() { localStorage.setItem("clinical_learning_progress", JSON.stringify(this.learningProgress)); },
        saveBookmarks() { localStorage.setItem("clinical_bookmarks", JSON.stringify(this.bookmarks)); },

        onCategoryChange() {
            this.currentCategory = $("category-select").value;
            const subjects = Object.keys(this.SHEET_DATA[this.currentCategory]);
            
            const subjectSelect = $("subject-select");
            subjectSelect.innerHTML = "";
            subjects.forEach(sub => {
                const opt = document.createElement("option");
                opt.value = sub;
                opt.innerText = sub;
                subjectSelect.appendChild(opt);
            });
            this.onSubjectChange();
        },

        onSubjectChange() {
            this.currentSubject = $("subject-select").value;
            $("display-subject-name").innerText = this.currentSubject;
            
            this.allQuizData = [];
            if (!this.learningProgress[this.currentSubject]) this.learningProgress[this.currentSubject] = {};
            
            const url = this.SHEET_DATA[this.currentCategory][this.currentSubject];
            if (url) {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        this.allQuizData = results.data.filter(row => row['문제'] && row['문제'].trim());
                        this.updateDashboardUI();
                    }
                });
            } else {
                this.updateDashboardUI();
            }
        },

        updateDashboardUI() {
            const total = this.allQuizData.length;
            $("total-db-count").innerText = total;
            $("total-db-count-lr").innerText = total;
            
            const subjectProgress = this.learningProgress[this.currentSubject] || {};
            let checkCount = 0;
            this.allQuizData.forEach(q => { if (subjectProgress[q['문제']] === true) checkCount++; });
            
            $("check-count").innerText = checkCount;
            const rate = total === 0 ? 0 : Math.round((checkCount / total) * 100);
            $("learning-rate-text").innerText = rate;
            $("learning-rate-bar").style.width = rate + "%";

            this.renderBookmarkFolders();
        },

        renderBookmarkFolders() {
            const container = $("bookmark-folders");
            container.innerHTML = "";
            const folders = Object.keys(this.bookmarks);
            if (folders.length === 0) {
                container.innerHTML = `<span style="font-size: 0.9em; color: #94a3b8;">저장된 폴더가 없습니다.</span>`;
                return;
            }
            folders.forEach(folder => {
                const tag = document.createElement("span");
                tag.className = "folder-tag";
                tag.innerText = `📂 ${folder} (${this.bookmarks[folder].length})`;
                tag.onclick = () => this.startQuizFromBookmark(folder);
                container.appendChild(tag);
            });
        },

        showScreen(id) {
            ["start-screen", "quiz-area", "study-area", "result-screen", "search-screen"].forEach(s => $(s).style.display = (s===id?'block':'none'));
        },

        isBookmarked(q) {
            for (const folder in this.bookmarks) {
                if (this.bookmarks[folder].some(bq => bq['문제'] === q['문제'])) return true;
            }
            return false;
        },

        removeBookmark(q) {
            for (const folder in this.bookmarks) {
                this.bookmarks[folder] = this.bookmarks[folder].filter(bq => bq['문제'] !== q['문제']);
                if (this.bookmarks[folder].length === 0) delete this.bookmarks[folder];
            }
            this.saveBookmarks();
        },

        toggleBookmark(q, btnElement) {
            if (this.isBookmarked(q)) {
                if(confirm("이 문제를 북마크에서 삭제하시겠습니까?")) {
                    this.removeBookmark(q);
                    btnElement.innerText = "☆";
                    this.renderBookmarkFolders();
                }
            } else {
                const folderName = prompt("저장할 북마크 폴더명을 입력하세요:", "기본 폴더");
                if (!folderName) return;

                if (!this.bookmarks[folderName]) this.bookmarks[folderName] = [];
                this.bookmarks[folderName].push(q);
                this.saveBookmarks();
                btnElement.innerText = "⭐";
                this.renderBookmarkFolders();
                alert(`'${folderName}' 폴더에 저장되었습니다.`);
            }
        },

        // --- 공통 정답표시/해설 카드 생성 (검색, 해설모드용) ---
        createReviewCard(q, indexText = "") {
            const div = document.createElement("div");
            div.className = "review-card";
            
            let imgHtml = (q['이미지'] && q['이미지'].trim()) ? `<img src="./images/${q['이미지'].trim()}" style="max-width:100%; display:block; margin-bottom:10px;" onerror="this.style.display='none'">` : '';
            
            let optionsHtml = '<div class="options" style="margin-top: 10px;">';
            ['A','B','C','D','E'].forEach(opt => {
                const val = q[`보기${opt}`];
                if (val && val.trim()) {
                    const isCorrect = (q['정답'].trim().toUpperCase() === opt);
                    const bgStyle = isCorrect ? 'background-color: #d4edda; border: 1px solid #1e7e34; color: #155724; font-weight:bold;' : 'background-color: #ffffff; border: 1px solid #cbd5e1; color: #334155;';
                    optionsHtml += `<div style="padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; ${bgStyle}">${opt}) ${val} ${isCorrect ? ' ⭕ (정답)' : ''}</div>`;
                }
            });
            optionsHtml += '</div>';

            const starIcon = this.isBookmarked(q) ? "⭐" : "☆";

            div.innerHTML = `
                <button class="card-bookmark-btn" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5em; cursor: pointer; color: #fbbf24;">${starIcon}</button>
                <div class="q-title">${indexText}Q. ${q['문제']}</div>
                ${imgHtml}
                ${optionsHtml}
                <div class="feedback info" style="display:block; margin-top: auto;">
                    <strong>📖 해설:</strong><br>
                    <span class="explanation-text">${q['해설'] || "해설이 등록되지 않았습니다."}</span>
                </div>
            `;
            div.querySelector('.card-bookmark-btn').onclick = (e) => this.toggleBookmark(q, e.target);
            return div;
        },

        // --- 검색 기능 ---
        showSearchScreen() {
            this.showScreen("search-screen");
            $("full-search-input").value = "";
            $("full-search-results").innerHTML = "<div style='color:#64748b; text-align:center; padding:30px; grid-column:1/-1;'>검색어를 입력하면 전체 문제 정보가 나타납니다.</div>";
        },

        executeSearch() {
            const keyword = $("full-search-input").value.toLowerCase().trim();
            const resContainer = $("full-search-results");
            
            if (keyword.length < 2) return;

            const results = this.allQuizData.filter(q => q['문제'].toLowerCase().includes(keyword) || (q['해설'] && q['해설'].toLowerCase().includes(keyword)));
            resContainer.innerHTML = "";
            if (results.length === 0) {
                resContainer.innerHTML = `<div style="color:#b91c1c; text-align:center; padding:30px; font-weight:bold; grid-column:1/-1;">검색 결과가 없습니다.</div>`;
            } else {
                results.forEach((q) => resContainer.appendChild(this.createReviewCard(q)));
            }
        },

        // --- 퀴즈 풀이 로직 ---
        startQuiz(mode) {
            if (this.allQuizData.length === 0) return alert("문제가 로드되지 않았습니다.");
            this.currentMode = mode;
            let count = parseInt($("question-count").value) || 10;
            count = Math.min(count, this.allQuizData.length);
            this.currentQuizPool = [...this.allQuizData].sort(() => Math.random() - 0.5).slice(0, count);
            this.launchQuiz();
        },

        startQuizFromBookmark(folderName) {
            this.currentQuizPool = [...this.bookmarks[folderName]].sort(() => Math.random() - 0.5);
            this.currentMode = "practice";
            this.launchQuiz();
        },

        launchQuiz() {
            this.currentPage = 0;
            this.userAnswers = {};
            this.practiceSubmitted = {};
            
            $("total-quiz-num").innerText = this.currentQuizPool.length;
            $("mode-badge").innerText = this.currentMode === 'exam' ? "📝 시험모드" : "✏️ 연습모드";
            
            this.showScreen("quiz-area");
            this.renderQuizPage();
        },

        renderQuizPage() {
            const grid = $("quiz-grid");
            grid.innerHTML = "";
            
            const startIdx = this.currentPage * this.itemsPerPage;
            const endIdx = Math.min(startIdx + this.itemsPerPage, this.currentQuizPool.length);
            
            for (let i = startIdx; i < endIdx; i++) {
                grid.appendChild(this.createInteractiveQuizCard(i));
            }
            
            $("current-page-text").innerText = this.currentPage + 1;
            this.renderPagination();
        },

        createInteractiveQuizCard(index) {
            const q = this.currentQuizPool[index];
            const card = document.createElement("div");
            card.className = "review-card";
            
            const starIcon = this.isBookmarked(q) ? "⭐" : "☆";
            let imgHtml = (q['이미지'] && q['이미지'].trim()) ? `<img src="./images/${q['이미지'].trim()}" style="max-width:100%; display:block; margin-bottom:10px;" onerror="this.style.display='none'">` : '';
            
            card.innerHTML = `
                <button class="card-bookmark-btn" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5em; cursor: pointer; color: #fbbf24;">${starIcon}</button>
                <div class="q-title">${index + 1}. ${q['문제']}</div>
                ${imgHtml}
            `;
            card.querySelector('.card-bookmark-btn').onclick = (e) => this.toggleBookmark(q, e.target);

            const optsDiv = document.createElement("div");
            optsDiv.className = "options";
            ['A','B','C','D','E'].forEach(opt => {
                const val = q[`보기${opt}`];
                if (val && val.trim()) {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = `${opt}) ${val}`;
                    
                    if (this.userAnswers[index] === opt) btn.classList.add("selected");
                    
                    if (this.currentMode === 'practice' && this.practiceSubmitted[index]) {
                        btn.disabled = true;
                        const isCorrectAns = (q['정답'].trim().toUpperCase() === opt);
                        const isUserAns = (this.userAnswers[index] === opt);
                        if (isCorrectAns) btn.classList.add("correct");
                        else if (isUserAns && !isCorrectAns) btn.classList.add("wrong");
                    }

                    btn.onclick = () => {
                        if (this.currentMode === 'practice' && this.practiceSubmitted[index]) return;
                        this.userAnswers[index] = opt;
                        this.renderQuizPage();
                    };
                    optsDiv.appendChild(btn);
                }
            });
            card.appendChild(optsDiv);

            if (this.currentMode === 'practice') {
                if (!this.practiceSubmitted[index]) {
                    const checkBtn = document.createElement("button");
                    checkBtn.className = "btn btn-primary btn-small";
                    checkBtn.style.marginTop = "15px";
                    checkBtn.innerText = "정답 확인하기";
                    checkBtn.onclick = () => this.submitPracticeAnswer(index);
                    card.appendChild(checkBtn);
                } else {
                    const isCorrect = this.userAnswers[index] === q['정답'].trim().toUpperCase();
                    const fbDiv = document.createElement("div");
                    fbDiv.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
                    fbDiv.style.display = 'block';
                    fbDiv.innerHTML = `
                        <div style="font-weight: bold;">${isCorrect ? '⭕ 정답입니다!' : `❌ 오답입니다. (정답: ${q['정답']})`}</div>
                        <div class="explanation-text">${q['해설'] || "해설이 없습니다."}</div>
                    `;
                    card.appendChild(fbDiv);
                }
            }

            return card;
        },

        submitPracticeAnswer(index) {
            if (!this.userAnswers[index]) return alert("먼저 답안을 선택해주세요.");
            this.practiceSubmitted[index] = true;
            
            const q = this.currentQuizPool[index];
            const isCorrect = this.userAnswers[index] === q['정답'].trim().toUpperCase();
            this.updateLearningRate(q, isCorrect);
            
            this.renderQuizPage();
        },

        renderPagination() {
            const totalPages = Math.ceil(this.currentQuizPool.length / this.itemsPerPage);
            const container = $("pagination-controls");
            container.innerHTML = "";

            const prevBtn = document.createElement("button");
            prevBtn.className = "page-btn";
            prevBtn.innerText = "◀ 이전";
            prevBtn.disabled = this.currentPage === 0;
            prevBtn.onclick = () => { this.currentPage--; this.renderQuizPage(); window.scrollTo(0, 0); };
            container.appendChild(prevBtn);

            for (let i = 0; i < totalPages; i++) {
                const pBtn = document.createElement("button");
                pBtn.className = `page-btn ${i === this.currentPage ? 'active' : ''}`;
                pBtn.innerText = i + 1;
                pBtn.onclick = () => { this.currentPage = i; this.renderQuizPage(); window.scrollTo(0, 0); };
                container.appendChild(pBtn);
            }

            const nextBtn = document.createElement("button");
            nextBtn.className = "page-btn";
            nextBtn.innerText = "다음 ▶";
            nextBtn.disabled = this.currentPage === totalPages - 1;
            nextBtn.onclick = () => { this.currentPage++; this.renderQuizPage(); window.scrollTo(0, 0); };
            container.appendChild(nextBtn);

            const finishBtn = $("finish-exam-btn");
            if (this.currentMode === 'exam' && this.currentPage === totalPages - 1) {
                finishBtn.style.display = "block";
            } else {
                finishBtn.style.display = "none";
            }
        },

        updateLearningRate(q, isCorrect) {
            if (!this.learningProgress[this.currentSubject]) this.learningProgress[this.currentSubject] = {};
            this.learningProgress[this.currentSubject][q['문제']] = isCorrect;
            this.saveProgress();
        },

        // --- 시험 종료 및 결과 처리 (오답노트 UI 해설모드형으로 전면 개편) ---
        finishExam() {
            const unanswered = this.currentQuizPool.length - Object.keys(this.userAnswers).length;
            if (unanswered > 0) {
                if (!confirm(`${unanswered}문제를 아직 풀지 않았습니다. 정말로 시험을 종료하고 제출하시겠습니까?`)) return;
            }

            let correctCount = 0;
            const wrongList = [];

            this.currentQuizPool.forEach((q, idx) => {
                const userAns = this.userAnswers[idx];
                const isCorrect = userAns === q['정답'].trim().toUpperCase();
                
                this.updateLearningRate(q, isCorrect);

                if (isCorrect) {
                    correctCount++;
                } else {
                    wrongList.push({ question: q, userAns: userAns || "", index: idx + 1 });
                }
            });

            this.showScreen("result-screen");
            $("correct-count").innerText = correctCount;
            $("result-total-count").innerText = this.currentQuizPool.length;
            
            const ratio = correctCount / this.currentQuizPool.length;
            $("score-message").innerText = ratio === 1 ? "Perfect! 완벽합니다." : ratio >= 0.7 ? "합격권입니다. 오답을 확인하세요." : "복습이 필요합니다.";
            
            const reviewCont = $("wrong-review-list");
            reviewCont.innerHTML = "";
            
            if (wrongList.length === 0) {
                reviewCont.innerHTML = "<div style='color:#1e7e34; font-weight:bold; text-align:center; padding: 30px; grid-column:1/-1;'>틀린 문제가 없습니다!</div>";
                return;
            }

            // 오답노트를 해설모드(전체 보기 표시)와 동일하게 렌더링
            wrongList.forEach((wrongItem) => {
                const q = wrongItem.question;
                const div = document.createElement("div");
                div.className = "review-card";
                
                let imgHtml = (q['이미지'] && q['이미지'].trim()) ? `<img src="./images/${q['이미지'].trim()}" style="max-width:100%; display:block; margin-bottom:10px;" onerror="this.style.display='none'">` : '';
                const starIcon = this.isBookmarked(q) ? "⭐" : "☆";

                // 전체 선택지 블록 생성 및 정답/오답 하이라이트
                let optionsHtml = '<div class="options" style="margin-top: 10px;">';
                ['A','B','C','D','E'].forEach(opt => {
                    const val = q[`보기${opt}`];
                    if (val && val.trim()) {
                        const isCorrectAns = (q['정답'].trim().toUpperCase() === opt);
                        const isUserAns = (wrongItem.userAns === opt);

                        let bgStyle = 'background-color: #ffffff; border: 1px solid #cbd5e1; color: #334155;';
                        let icon = '';

                        if (isCorrectAns) {
                            bgStyle = 'background-color: #d4edda; border: 1px solid #1e7e34; color: #155724; font-weight:bold;';
                            icon = ' ⭕ (정답)';
                        } else if (isUserAns) {
                            bgStyle = 'background-color: #f8d7da; border: 1px solid #b91c1c; color: #721c24; font-weight:bold;';
                            icon = ' ❌ (나의 답)';
                        }

                        optionsHtml += `<div style="padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; ${bgStyle}">${opt}) ${val}${icon}</div>`;
                    }
                });
                optionsHtml += '</div>';

                div.innerHTML = `
                    <button class="card-bookmark-btn" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5em; cursor: pointer; color: #fbbf24;">${starIcon}</button>
                    <div class="q-title" style="padding-right: 35px;">${wrongItem.index}. ${q['문제']}</div>
                    ${imgHtml}
                    ${optionsHtml}
                    <div class="feedback info" style="display:block; margin-top: auto;">
                        <strong>📖 해설:</strong><br>
                        <span class="explanation-text">${q['해설'] || "해설이 등록되지 않았습니다."}</span>
                    </div>
                `;
                div.querySelector('.card-bookmark-btn').onclick = (e) => this.toggleBookmark(q, e.target);
                reviewCont.appendChild(div);
            });
        },

        // --- 해설 모드 ---
        startReviewMode() {
            if (this.allQuizData.length === 0) return alert("문제가 로드되지 않았습니다.");
            
            $("study-total-num").innerText = this.allQuizData.length;
            const container = $("study-list");
            container.innerHTML = "";
            
            this.allQuizData.forEach((q, idx) => {
                container.appendChild(this.createReviewCard(q, `${idx + 1}. `));
            });
            
            this.showScreen("study-area");
        },

        goHome() { 
            this.updateDashboardUI(); 
            this.showScreen("start-screen"); 
        },

        toggleTheme() {
            document.body.classList.toggle("korea-theme");
            const isK = document.body.classList.contains("korea-theme");
            $("main-title").innerText = isK ? "Korea Univ. Med-Lab Portal" : "Yonsei Clinical Science Portal";
            localStorage.setItem("theme", isK ? "korea" : "yonsei");
        },

        loadTheme() { if (localStorage.getItem("theme") === "korea") this.toggleTheme(); }
    };

    document.addEventListener("DOMContentLoaded", () => app.init());
</script>
