<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연세대학교 임상병리학 실전 평가 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Malgun Gothic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #1e293b; /* 깔끔한 다크 그레이 텍스트 */
            line-height: 1.6; 
            padding: 20px;
            /* 배경 이미지 설정 */
            background-image: url('./images/yonsei_bg.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;
            background-color: #00205B; /* 연세 블루 계열 배경 */
        }
        
        /* 깔끔하고 밝은 학교 포털 느낌의 컨테이너 */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); /* 거의 불투명한 깔끔한 화이트 */
            padding: 35px; 
            border-radius: 8px; 
            box-shadow: 0 8px 30px rgba(0, 56, 118, 0.2); 
            border: 2px solid #003876; /* 연세 블루 테두리 */
        }
        
        h1, h2 { text-align: center; color: #003876; font-weight: 800; letter-spacing: -0.5px; }
        
        /* 공통 버튼 스타일 */
        .btn { 
            display: block; width: 100%; padding: 15px; margin-top: 15px; 
            border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; 
            cursor: pointer; color: #fff; transition: all 0.2s ease; 
        }
        
        /* 연세 블루 포인트 버튼 */
        .btn-primary { background: #003876; border: none; }
        .btn-primary:hover { background: #0050a0; box-shadow: 0 4px 12px rgba(0, 56, 118, 0.3); }
        
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        
        .btn-success { background: #003876; border: none; }
        .btn-success:hover { background: #0050a0; }
        
        .btn-danger { background: #8B0000; border: none; }
        .btn-danger:hover { background: #a50000; }

        /* 메인 화면 스타일 */
        .settings-box { 
            background: #f8fafc; 
            padding: 20px; border-radius: 6px; margin-bottom: 20px; text-align: center; 
            border: 1px solid #cbd5e1;
        }
        .settings-box strong#total-db-count { color: #003876; font-size: 1.1em; }
        .settings-box input { 
            padding: 10px; font-size: 1.1em; width: 80px; text-align: center; 
            background: white; color: #1e293b; border: 1px solid #cbd5e1; border-radius: 4px; 
        }
        .settings-box input:focus { outline: none; border-color: #003876; }
        
        /* 퀴즈 화면 스타일 */
        .progress { text-align: right; color: #64748b; font-size: 0.95em; margin-bottom: 20px; font-weight: bold; }
        .question-box { margin-bottom: 25px; }
        .question-text { font-size: 1.25em; font-weight: bold; margin-bottom: 15px; color: #0f172a; }
        .image-container img { max-width: 100%; border-radius: 4px; margin-bottom: 15px; border: 1px solid #cbd5e1; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        
        /* 보기 버튼 스타일: LMS 시험 객관식 느낌 */
        .option-btn { 
            padding: 14px 18px; border: 2px solid #cbd5e1; border-radius: 6px; 
            background: white; 
            cursor: pointer; text-align: left; font-size: 1.05em; color: #1e293b; 
            transition: all 0.2s ease; 
        }
        .option-btn:hover { border-color: #003876; background: #f1f5f9; }
        .option-btn.selected { border-color: #003876; background: #003876; color: white; }
        
        /* 채점 후 색상: 확실한 정답/오답 컬러 */
        .option-btn.correct { border-color: #1e7e34; background: #1e7e34; color: white; }
        .option-btn.wrong { border-color: #b91c1c; background: #b91c1c; color: white; }
        
        .subjective-input { 
            padding: 15px; font-size: 1.1em; width: 100%; box-sizing: border-box;
            background: white; color: #1e293b; border: 2px solid #cbd5e1; border-radius: 6px; 
        }
        .subjective-input:focus { outline: none; border-color: #003876; box-shadow: 0 0 5px rgba(0, 56, 118, 0.3); }
        
        .feedback { margin-top: 25px; padding: 18px; border-radius: 6px; display: none; line-height: 1.5; }
        /* 해설 박스 */
        .feedback.correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .feedback.wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .explanation { margin-top: 12px; font-weight: bold; color: #333; }
        
        #loading { text-align: center; font-size: 1.2em; color: #003876; margin-top: 50px; font-weight: bold; }
        
        /* 결과 화면 스타일 */
        .result-stats { 
            font-size: 1.2em; text-align: center; margin: 20px 0; padding: 25px; 
            background: #f8fafc; border-radius: 8px; border: 1px solid #dbeafe; 
            color: #1e293b;
        }
        #score-message { color: #003876; display: block; margin-top: 15px; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">시험 데이터를 동기화 중입니다...</div>
    
    <div id="start-screen" style="display: none;">
        <h1>연세대학교 임상병리학 실전 평가 시스템</h1>
        <div class="settings-box">
            <p>현재 <strong id="total-db-count">0</strong>개의 문항이 데이터베이스에 등록되어 있습니다.</p>
            <label for="question-count">응시할 문항 수: </label>
            <input type="number" id="question-count" value="10" min="1">
        </div>
        <button class="btn btn-primary" onclick="startQuiz('random')">실전 모의고사 응시 (랜덤)</button>
        <button class="btn btn-secondary" onclick="startQuiz('all')">전체 문항 순차 학습</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress">진행률: <span id="current-num">1</span> / <span id="total-num">10</span></div>
        
        <div class="question-box">
            <div id="question-text" class="question-text">문제 내용</div>
            <div id="image-container" class="image-container"></div>
        </div>

        <div id="options-container" class="options"></div>

        <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()">답안 제출</button>
        
        <div id="feedback-box" class="feedback">
            <div id="feedback-text" style="font-size: 1.1em; font-weight: bold;"></div>
            <div id="explanation-text" class="explanation"></div>
        </div>

        <button id="next-btn" class="btn btn-success" style="display:none;" onclick="nextQuestion()">다음 문항</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>평가 종료</h2>
        <div class="result-stats">
            최종 정답 수: <strong id="correct-count" style="color:#1e7e34; font-size: 1.3em;">0</strong> / <strong id="result-total-count">0</strong>
            <span id="score-message"></span>
        </div>
        
        <button id="retry-wrong-btn" class="btn btn-danger" style="display:none;" onclick="startWrongQuiz()">오답 노트 (틀린 문항 재평가)</button>
        <button class="btn btn-secondary" onclick="goHome()">초기 화면으로 복귀</button>
    </div>
</div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9G8mJqpsn9xWmhg_2LCAWbfi2vsZTxRdq77NStrnzYHG3HCfgpatnlFh1Y6gP0IblU3EVJMPYr6_0/pub?output=csv"; 

    let allQuizData = [];
    let currentQuizPool = [];
    let wrongQuestions = [];
    
    let currentIndex = 0;
    let correctAnswers = 0;
    let selectedOption = null;

    Papa.parse(SHEET_CSV_URL, {
        download: true,
        header: true,
        complete: function(results) {
            allQuizData = results.data.filter(row => row['문제'] && row['문제'].trim() !== '');
            if (allQuizData.length > 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('start-screen').style.display = 'block';
                document.getElementById('total-db-count').innerText = allQuizData.length;
                document.getElementById('question-count').max = allQuizData.length;
                document.getElementById('question-count').value = Math.min(10, allQuizData.length);
            } else {
                document.getElementById('loading').innerText = "데이터베이스 접근 실패. URL을 확인해 주십시오.";
            }
        }
    });

    function shuffleArray(array) {
        let shuffled = array.slice();
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function startQuiz(mode) {
        if (mode === 'random') {
            const countInput = parseInt(document.getElementById('question-count').value);
            const count = Math.min(countInput, allQuizData.length);
            currentQuizPool = shuffleArray(allQuizData).slice(0, count);
        } else if (mode === 'all') {
            currentQuizPool = allQuizData.slice();
        }
        initializeQuizState();
    }

    function startWrongQuiz() {
        currentQuizPool = shuffleArray(wrongQuestions);
        initializeQuizState();
    }

    function initializeQuizState() {
        wrongQuestions = [];
        currentIndex = 0;
        correctAnswers = 0;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('total-num').innerText = currentQuizPool.length;
        
        loadQuestion(currentIndex);
    }

    function goHome() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    function loadQuestion(index) {
        const q = currentQuizPool[index];
        selectedOption = null;
        
        document.getElementById('current-num').innerText = index + 1;
        document.getElementById('question-text').innerText = q['문제'];
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        
        const imageContainer = document.getElementById('image-container');
        const optionsContainer = document.getElementById('options-container');
        imageContainer.innerHTML = '';
        optionsContainer.innerHTML = '';

        if (q['이미지'] && q['이미지'].trim() !== '') {
            const img = document.createElement('img');
            img.src = `./images/${q['이미지'].trim()}`;
            imageContainer.appendChild(img);
        }

        const hasA = q['보기A'] && q['보기A'].trim() !== '';
        
        if (!hasA) {
            optionsContainer.innerHTML = `<input type="text" id="subjective-answer" class="subjective-input" placeholder="정답을 입력하세요">`;
        } else {
            const options = ['A', 'B', 'C', 'D', 'E'];
            options.forEach(opt => {
                const key = `보기${opt}`;
                if (q[key] && q[key].trim() !== '') {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${opt}) ${q[key]}`;
                    btn.onclick = () => selectOption(btn, opt);
                    optionsContainer.appendChild(btn);
                }
            });
        }
    }

    function selectOption(button, optionLetter) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
        selectedOption = optionLetter;
    }

    function checkAnswer() {
        const q = currentQuizPool[currentIndex];
        const hasA = q['보기A'] && q['보기A'].trim() !== '';
        let isCorrect = false;

        if (!hasA) {
            const inputEl = document.getElementById('subjective-answer');
            const userAnswer = inputEl.value.trim().toLowerCase();
            const correctAnswer = q['정답'].trim().toLowerCase();
            if(userAnswer === '') { alert("답안을 입력해 주십시오."); return; }
            
            isCorrect = (userAnswer === correctAnswer);
            inputEl.disabled = true;
        } else {
            if (!selectedOption) { alert("보기를 선택해 주십시오."); return; }
            isCorrect = (selectedOption === q['정답'].trim().toUpperCase());
            
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText.startsWith(q['정답'].trim().toUpperCase())) {
                    btn.classList.add('correct');
                } else if (btn.classList.contains('selected') && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
        }

        const feedbackBox = document.getElementById('feedback-box');
        const feedbackText = document.getElementById('feedback-text');
        const explanationText = document.getElementById('explanation-text');

        feedbackBox.style.display = 'block';
        if (isCorrect) {
            correctAnswers++;
            feedbackBox.className = 'feedback correct';
            feedbackText.innerText = '⭕ 정답입니다.';
        } else {
            wrongQuestions.push(q);
            feedbackBox.className = 'feedback wrong';
            feedbackText.innerText = `❌ 오답입니다. (정답: ${q['정답']})`;
        }
        
        explanationText.innerText = q['해설'] ? q['해설'] : '';

        document.getElementById('submit-btn').style.display = 'none';
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        if (currentIndex === currentQuizPool.length - 1) {
            nextBtn.innerText = "결과 확인";
            nextBtn.className = "btn btn-primary";
        } else {
            nextBtn.innerText = "다음 문항";
            nextBtn.className = "btn btn-success";
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuizPool.length) {
            loadQuestion(currentIndex);
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('correct-count').innerText = correctAnswers;
        document.getElementById('result-total-count').innerText = currentQuizPool.length;
        
        const scoreRatio = correctAnswers / currentQuizPool.length;
        const scoreMsg = document.getElementById('score-message');
        
        if (scoreRatio === 1) {
            scoreMsg.innerText = "탁월한 성적입니다. 완벽하게 이해하셨습니다.";
        } else if (scoreRatio >= 0.7) {
            scoreMsg.innerText = "우수한 성적입니다. 합격권에 도달했습니다.";
        } else {
            scoreMsg.innerText = "추가적인 학습이 필요합니다. 오답 노트를 활용해 주십시오.";
        }

        const retryBtn = document.getElementById('retry-wrong-btn');
        if (wrongQuestions.length > 0) {
            retryBtn.style.display = 'block';
            retryBtn.innerText = `오답 노트 (${wrongQuestions.length}문항 재평가)`;
        } else {
            retryBtn.style.display = 'none';
        }
    }
</script>
</body>
</html>
